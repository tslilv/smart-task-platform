<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Smart Task Platform</span>
        <span class="text-white">Product Dashboard</span>
    </div>
</nav>

<div class="container mt-4">

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>DAU</h6>
                    <h2 id="dau">-</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Tasks Created</h6>
                    <h2 id="tasksCreated">-</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Completion Rate</h6>
                    <h2 id="completionRate">-%</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">User</div>
        <div class="card-body">

            <div class="row g-2">
                <div class="col-md-3">
                    <input id="name" class="form-control" placeholder="Name">
                </div>
                <div class="col-md-3">
                    <input id="email" class="form-control" placeholder="Email">
                </div>
                <div class="col-md-3">
                    <input id="password" class="form-control" type="password" placeholder="Password">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="signup()">Sign Up</button>
                </div>
            </div>

            <hr>

            <div class="row g-2">
                <div class="col-md-4">
                    <input id="login_email" class="form-control" placeholder="Login email">
                </div>
                <div class="col-md-4">
                    <input id="login_password" class="form-control" type="password" placeholder="Login password">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100" onclick="login()">Login</button>
                </div>
            </div>

            <p class="mt-3 mb-0">Current User ID: <b id="currentUser">None</b></p>
            <input id="user_id" type="hidden">

        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">Create Task</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-4">
                    <input id="title" class="form-control" placeholder="Task title">
                </div>
                <div class="col-md-4">
                    <input id="description" class="form-control" placeholder="Description">
                </div>
                <div class="col-md-2">
                    <select id="priority" class="form-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="createTask()">Create</button>
                </div>
            </div>
        </div>
    </div>
    <div class="card shadow-sm mb-4">
    <div class="card-header">Search & Filters</div>
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-6">
                <input id="searchInput" class="form-control" placeholder="Search task..." oninput="renderTasks()">
            </div>

            <div class="col-md-3">
                <select id="priorityFilter" class="form-select" onchange="renderTasks()">
                    <option value="all">All Priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>

            <div class="col-md-3">
                <select id="statusFilter" class="form-select" onchange="renderTasks()">
                    <option value="all">All Statuses</option>
                    <option value="open">Open</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>
    </div>
</div>
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between">
            <span>Tasks</span>
            <button class="btn btn-sm btn-outline-primary" onclick="loadTasks()">Refresh</button>
        </div>

        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="tasks"></tbody>
            </table>
        </div>
    </div>

</div>
<script src="dashboard.js"></script>
</body>
</html>

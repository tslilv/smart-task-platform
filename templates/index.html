<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Smart Task Platform</span>
        <span class="text-white">Product Dashboard</span>
    </div>
</nav>

<div class="container mt-4">

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>DAU</h6>
                    <h2 id="dau">-</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Tasks Created</h6>
                    <h2 id="tasksCreated">-</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Completion Rate</h6>
                    <h2 id="completionRate">-%</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">User</div>
        <div class="card-body">

            <div class="row g-2">
                <div class="col-md-3">
                    <input id="name" class="form-control" placeholder="Name">
                </div>
                <div class="col-md-3">
                    <input id="email" class="form-control" placeholder="Email">
                </div>
                <div class="col-md-3">
                    <input id="password" class="form-control" type="password" placeholder="Password">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="signup()">Sign Up</button>
                </div>
            </div>

            <hr>

            <div class="row g-2">
                <div class="col-md-4">
                    <input id="login_email" class="form-control" placeholder="Login email">
                </div>
                <div class="col-md-4">
                    <input id="login_password" class="form-control" type="password" placeholder="Login password">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100" onclick="login()">Login</button>
                </div>
            </div>

            <p class="mt-3 mb-0">Current User ID: <b id="currentUser">None</b></p>
            <input id="user_id" type="hidden">

        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">Create Task</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-4">
                    <input id="title" class="form-control" placeholder="Task title">
                </div>
                <div class="col-md-4">
                    <input id="description" class="form-control" placeholder="Description">
                </div>
                <div class="col-md-2">
                    <select id="priority" class="form-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="createTask()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between">
            <span>Tasks</span>
            <button class="btn btn-sm btn-outline-primary" onclick="loadTasks()">Refresh</button>
        </div>

        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="tasks"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    async function signup() {
        const response = await fetch("/signup", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            })
        });

        const data = await response.json();
        alert(data.message);

        if (data.user_id) {
            setUser(data.user_id);
            loadTasks();
            loadAnalytics();
        }
    }

    async function login() {
        const response = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email: document.getElementById("login_email").value,
                password: document.getElementById("login_password").value
            })
        });

        const data = await response.json();
        alert(data.message);

        if (data.user_id) {
            setUser(data.user_id);
            loadTasks();
            loadAnalytics();
        }
    }

    function setUser(userId) {
        document.getElementById("user_id").value = userId;
        document.getElementById("currentUser").innerText = userId;
    }

    async function createTask() {
        const userId = document.getElementById("user_id").value;

        if (!userId) {
            alert("Please login or sign up first");
            return;
        }

        const response = await fetch("/task", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_id: Number(userId),
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                priority: document.getElementById("priority").value
            })
        });

        const data = await response.json();
        alert(data.message);

        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("priority").value = "medium";

        loadTasks();
        loadAnalytics();
    }

    async function loadTasks() {
        const userId = document.getElementById("user_id").value;

        if (!userId) {
            alert("Please login or sign up first");
            return;
        }

        const response = await fetch(`/tasks/${userId}`);
        const tasks = await response.json();

        const table = document.getElementById("tasks");
        table.innerHTML = "";

        tasks.forEach(task => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${escapeHtml(task.title)}</td>
                <td>${escapeHtml(task.description || "")}</td>
                <td>${priorityBadge(task.priority)}</td>
                <td>${statusBadge(task.status)}</td>
                <td>
                    <button class="btn btn-sm btn-success me-1" onclick="completeTask(${task.id})">
                        Complete
                    </button>

                    <button class="btn btn-sm btn-warning me-1" onclick="editTask(${task.id}, '${escapeForJs(task.title)}', '${escapeForJs(task.description || "")}', '${escapeForJs(task.priority)}')">
                        Edit
                    </button>

                    <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">
                        Delete
                    </button>
                </td>
            `;

            table.appendChild(row);
        });
    }

    async function completeTask(taskId) {
        const userId = Number(document.getElementById("user_id").value);

        const response = await fetch(`/task/${taskId}/complete`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({user_id: userId})
        });

        const data = await response.json();
        alert(data.message);

        loadTasks();
        loadAnalytics();
    }

    async function editTask(taskId, currentTitle, currentDescription, currentPriority) {
        const userId = Number(document.getElementById("user_id").value);

        const newTitle = prompt("Edit task title:", currentTitle);
        if (newTitle === null) return;

        const newDescription = prompt("Edit description:", currentDescription);
        if (newDescription === null) return;

        const newPriority = prompt("Edit priority: low / medium / high", currentPriority);
        if (newPriority === null) return;

        const response = await fetch(`/task/${taskId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_id: userId,
                title: newTitle,
                description: newDescription,
                priority: newPriority
            })
        });

        const data = await response.json();
        alert(data.message);

        loadTasks();
        loadAnalytics();
    }

    async function deleteTask(taskId) {
        const userId = Number(document.getElementById("user_id").value);

        if (!confirm("Are you sure you want to delete this task?")) {
            return;
        }

        const response = await fetch(`/task/${taskId}`, {
            method: "DELETE",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({user_id: userId})
        });

        const data = await response.json();
        alert(data.message);

        loadTasks();
        loadAnalytics();
    }

    async function loadAnalytics() {
        const dauResponse = await fetch("/analytics/dau");
        const dau = await dauResponse.json();

        const tasksResponse = await fetch("/analytics/tasks-created");
        const tasks = await tasksResponse.json();

        const rateResponse = await fetch("/analytics/completion-rate");
        const rate = await rateResponse.json();

        document.getElementById("dau").innerText = dau.daily_active_users;
        document.getElementById("tasksCreated").innerText = tasks.tasks_created;
        document.getElementById("completionRate").innerText = rate.completion_rate + "%";
    }

    function priorityBadge(priority) {
        if (priority === "high") {
            return `<span class="badge bg-danger">High</span>`;
        }

        if (priority === "medium") {
            return `<span class="badge bg-warning text-dark">Medium</span>`;
        }

        return `<span class="badge bg-success">Low</span>`;
    }

    function statusBadge(status) {
        if (status === "completed") {
            return `<span class="badge bg-success">Completed</span>`;
        }

        return `<span class="badge bg-secondary">Open</span>`;
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function escapeForJs(text) {
        return String(text)
            .replaceAll("\\", "\\\\")
            .replaceAll("'", "\\'")
            .replaceAll("\n", "\\n")
            .replaceAll("\r", "");
    }

    loadAnalytics();
</script>

</body>
</html>
